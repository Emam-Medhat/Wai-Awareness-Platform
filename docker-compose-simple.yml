services:
  app:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: wa3y_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    networks:
      - wa3y_network
    depends_on:
      - mysql
      - redis

  nginx:
    build:
      context: ./docker/nginx
      dockerfile: Dockerfile
    container_name: wa3y_nginx
    ports:
      - "8001:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - wa3y_network

  mysql:
    image: mysql:8.0
    container_name: wa3y_mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: wa3y_db
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: wa3y_user
      MYSQL_PASSWORD: wa3y_password
    volumes:
      - wa3y_mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    networks:
      - wa3y_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wa3y_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - wa3y_redis_data:/data
    networks:
      - wa3y_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: wa3y_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: root
      PMA_PASSWORD: root_password
    depends_on:
      - mysql
    networks:
      - wa3y_network

  queue:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: wa3y_queue
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    depends_on:
      - mysql
      - redis
    networks:
      - wa3y_network

  scheduler:
    build:
      context: ./docker/php
      dockerfile: Dockerfile
    container_name: wa3y_scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: sh -c "while true; do php artisan schedule:run; sleep 60; done"
    depends_on:
      - mysql
      - redis
    networks:
      - wa3y_network

volumes:
  wa3y_mysql_data:
  wa3y_redis_data:

networks:
  wa3y_network:
    driver: bridge
